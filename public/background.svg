  <line x1="440" y1="310" x2="620" y2="360" stroke="#4F8EF7" stroke-width="0.5" opacity="0.1"/>
  <line x1="880" y1="280" x2="860" y2="320" stroke="#5BC8AF" stroke-width="0.5" opacity="0.1"/>
  <line x1="1200" y1="380" x2="1340" y2="370" stroke="#4F8EF7" stroke-width="0.5" opacity="0.1"/>
  <line x1="1580" y1="260" x2="1700" y2="380" stroke="#7C5CFC" stroke-width="0.5" opacity="0.1"/>

  <!-- Worker nodes — outer clusters (teal/purple) -->
  <circle cx="120" cy="380" r="4" fill="#5BC8AF" opacity="0.7"/>
  <circle cx="60" cy="180" r="3.5" fill="#7C5CFC" opacity="0.65"/>
  <circle cx="200" cy="80" r="3" fill="#4F8EF7" opacity="0.6"/>
  <circle cx="380" cy="130" r="3.5" fill="#7C5CFC" opacity="0.6"/>
  <circle cx="440" cy="310" r="3" fill="#5BC8AF" opacity="0.55"/>

  <circle cx="560" cy="60" r="3.5" fill="#4F8EF7" opacity="0.6"/>
  <circle cx="760" cy="90" r="3" fill="#5BC8AF" opacity="0.55"/>
  <circle cx="700" cy="200" r="4" fill="#7C5CFC" opacity="0.65"/>
  <circle cx="620" cy="360" r="3" fill="#4F8EF7" opacity="0.55"/>
  <circle cx="800" cy="420" r="3.5" fill="#5BC8AF" opacity="0.6"/>
  <circle cx="880" cy="280" r="3" fill="#7C5CFC" opacity="0.55"/>

  <!-- Main hub (center) -->
  <circle cx="960" cy="160" r="10" fill="#4F8EF7" opacity="0.9"/>
  <circle cx="960" cy="160" r="6" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.5"/>
  <circle cx="960" cy="160" r="2.5" fill="#fff" opacity="0.9"/>
  <!-- Hub glow -->
  <circle cx="960" cy="160" r="28" fill="url(#nodeGlow)" opacity="0.5"/>

  <circle cx="1060" cy="320" r="4" fill="#7C5CFC" opacity="0.65"/>
  <circle cx="860" cy="320" r="4" fill="#7C5CFC" opacity="0.65"/>
  <circle cx="1120" cy="100" r="3.5" fill="#5BC8AF" opacity="0.6"/>
  <circle cx="820" cy="80" r="3.5" fill="#5BC8AF" opacity="0.6"/>
  <circle cx="1000" cy="420" r="3" fill="#4F8EF7" opacity="0.55"/>
  <circle cx="1200" cy="380" r="3.5" fill="#7C5CFC" opacity="0.6"/>
  <circle cx="740" cy="400" r="3.5" fill="#7C5CFC" opacity="0.6"/>

  <circle cx="1300" cy="60" r="3.5" fill="#4F8EF7" opacity="0.6"/>
  <circle cx="1500" cy="110" r="3" fill="#5BC8AF" opacity="0.55"/>
  <circle cx="1420" cy="200" r="4" fill="#7C5CFC" opacity="0.65"/>
  <circle cx="1340" cy="370" r="3" fill="#4F8EF7" opacity="0.55"/>
  <circle cx="1520" cy="430" r="3.5" fill="#5BC8AF" opacity="0.6"/>
  <circle cx="1580" cy="260" r="3" fill="#7C5CFC" opacity="0.55"/>

  <circle cx="1700" cy="380" r="4" fill="#5BC8AF" opacity="0.7"/>
  <circle cx="1760" cy="160" r="3.5" fill="#7C5CFC" opacity="0.65"/>
  <circle cx="1660" cy="100" r="3" fill="#4F8EF7" opacity="0.6"/>
  <circle cx="1840" cy="220" r="3.5" fill="#5BC8AF" opacity="0.6"/>

  <!-- Subtle horizontal scan line -->
  <line x1="0" y1="247" x2="1920" y2="247" stroke="#4F8EF7" stroke-width="0.4" opacity="0.06"/>
</svg>
