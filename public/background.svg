<svg width="1920" height="494" viewBox="0 0 1920 494" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Ambient glow gradients -->
    <radialGradient id="glow0" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4F8EF7" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#4F8EF7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7C5CFC" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#7C5CFC" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5BC8AF" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#5BC8AF" stop-opacity="0"/>
    </radialGradient>
    <!-- Node glow -->
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4F8EF7" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#4F8EF7" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur-soft">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1920" height="494" fill="#0a0a0f"/>

  <!-- Ambient blobs -->
  <ellipse cx="320" cy="180" rx="420" ry="280" fill="url(#glow1)" filter="url(#blur-soft)"/>
  <ellipse cx="960" cy="80" rx="560" ry="220" fill="url(#glow0)" filter="url(#blur-soft)"/>
  <ellipse cx="1600" cy="300" rx="380" ry="260" fill="url(#glow2)" filter="url(#blur-soft)"/>
  <ellipse cx="1200" cy="420" rx="300" ry="160" fill="url(#glow1)" filter="url(#blur-soft)"/>

  <!-- Connection lines (worker threads) -->
  <!-- Cluster 1 (left) -->
  <line x1="120" y1="380" x2="280" y2="220" stroke="#4F8EF7" stroke-width="0.8" opacity="0.25"/>
  <line x1="120" y1="380" x2="60" y2="180" stroke="#7C5CFC" stroke-width="0.8" opacity="0.2"/>
  <line x1="280" y1="220" x2="60" y2="180" stroke="#4F8EF7" stroke-width="0.6" opacity="0.15"/>
  <line x1="280" y1="220" x2="440" y2="310" stroke="#5BC8AF" stroke-width="0.8" opacity="0.2"/>
  <line x1="60" y1="180" x2="200" y2="80" stroke="#4F8EF7" stroke-width="0.6" opacity="0.18"/>
  <line x1="200" y1="80" x2="380" y2="130" stroke="#7C5CFC" stroke-width="0.7" opacity="0.2"/>
  <line x1="380" y1="130" x2="440" y2="310" stroke="#4F8EF7" stroke-width="0.6" opacity="0.15"/>

  <!-- Cluster 2 (center-left) -->
  <line x1="560" y1="60" x2="700" y2="200" stroke="#4F8EF7" stroke-width="0.8" opacity="0.22"/>
  <line x1="700" y1="200" x2="620" y2="360" stroke="#7C5CFC" stroke-width="0.8" opacity="0.2"/>
  <line x1="560" y1="60" x2="760" y2="90" stroke="#5BC8AF" stroke-width="0.7" opacity="0.18"/>
  <line x1="760" y1="90" x2="700" y2="200" stroke="#4F8EF7" stroke-width="0.6" opacity="0.15"/>
  <line x1="620" y1="360" x2="800" y2="420" stroke="#4F8EF7" stroke-width="0.7" opacity="0.18"/>
  <line x1="800" y1="420" x2="880" y2="280" stroke="#7C5CFC" stroke-width="0.6" opacity="0.15"/>
  <line x1="760" y1="90" x2="880" y2="280" stroke="#5BC8AF" stroke-width="0.7" opacity="0.2"/>

  <!-- Cluster 3 (center — main hub) -->
  <line x1="960" y1="160" x2="1060" y2="320" stroke="#4F8EF7" stroke-width="1" opacity="0.28"/>
  <line x1="960" y1="160" x2="860" y2="320" stroke="#4F8EF7" stroke-width="1" opacity="0.28"/>
  <line x1="960" y1="160" x2="1120" y2="100" stroke="#7C5CFC" stroke-width="0.8" opacity="0.22"/>
  <line x1="960" y1="160" x2="820" y2="80" stroke="#7C5CFC" stroke-width="0.8" opacity="0.22"/>
  <line x1="960" y1="160" x2="1000" y2="420" stroke="#5BC8AF" stroke-width="0.7" opacity="0.18"/>
  <line x1="1060" y1="320" x2="1200" y2="380" stroke="#4F8EF7" stroke-width="0.7" opacity="0.18"/>
  <line x1="860" y1="320" x2="740" y2="400" stroke="#4F8EF7" stroke-width="0.7" opacity="0.18"/>
  <line x1="1120" y1="100" x2="1200" y2="380" stroke="#5BC8AF" stroke-width="0.6" opacity="0.14"/>
  <line x1="820" y1="80" x2="740" y2="400" stroke="#5BC8AF" stroke-width="0.6" opacity="0.14"/>

  <!-- Cluster 4 (center-right) -->
  <line x1="1300" y1="60" x2="1420" y2="200" stroke="#4F8EF7" stroke-width="0.8" opacity="0.22"/>
  <line x1="1420" y1="200" x2="1340" y2="370" stroke="#7C5CFC" stroke-width="0.8" opacity="0.2"/>
  <line x1="1300" y1="60" x2="1500" y2="110" stroke="#5BC8AF" stroke-width="0.7" opacity="0.18"/>
  <line x1="1500" y1="110" x2="1420" y2="200" stroke="#4F8EF7" stroke-width="0.6" opacity="0.15"/>
  <line x1="1340" y1="370" x2="1520" y2="430" stroke="#4F8EF7" stroke-width="0.7" opacity="0.18"/>
  <line x1="1520" y1="430" x2="1580" y2="260" stroke="#7C5CFC" stroke-width="0.6" opacity="0.15"/>
  <line x1="1500" y1="110" x2="1580" y2="260" stroke="#5BC8AF" stroke-width="0.7" opacity="0.2"/>

  <!-- Cluster 5 (right) -->
  <line x1="1700" y1="380" x2="1840" y2="220" stroke="#4F8EF7" stroke-width="0.8" opacity="0.25"/>
  <line x1="1700" y1="380" x2="1760" y2="160" stroke="#7C5CFC" stroke-width="0.8" opacity="0.2"/>
  <line x1="1840" y1="220" x2="1760" y2="160" stroke="#4F8EF7" stroke-width="0.6" opacity="0.15"/>
  <line x1="1840" y1="220" x2="1660" y2="100" stroke="#5BC8AF" stroke-width="0.7" opacity="0.18"/>
  <line x1="1660" y1="100" x2="1760" y2="160" stroke="#4F8EF7" stroke-width="0.6" opacity="0.15"/>

