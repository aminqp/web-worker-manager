<svg width="800" height="56" viewBox="0 0 800 56" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- ── TypeScript ── -->
  <g transform="translate(0,4)">
    <rect width="32" height="32" rx="4" fill="#3178C6"/>
    <text x="4" y="23" font-family="'Courier New',monospace" font-size="13" font-weight="bold" fill="white">TS</text>
  </g>
  <text x="38" y="26" font-family="Arial,sans-serif" font-size="13" fill="white" fill-opacity="0.65">TypeScript</text>

  <!-- ── Vite ── -->
  <g transform="translate(140,4)">
    <rect width="32" height="32" rx="4" fill="#1e1e2e"/>
    <!-- outer bolt (purple) -->
    <polygon points="19,3 11,17 16.5,17 13,29 23,15 17.5,15" fill="#BD34FE"/>
    <!-- inner bolt (blue) -->
    <polygon points="19,3 17.5,15 23,15" fill="#646CFF"/>
  </g>
  <text x="178" y="26" font-family="Arial,sans-serif" font-size="13" fill="white" fill-opacity="0.65">Vite</text>

  <!-- ── Vitest ── -->
  <g transform="translate(240,4)">
    <rect width="32" height="32" rx="4" fill="#1e1e2e"/>
    <!-- outer bolt (dark green) -->
    <polygon points="19,3 11,17 16.5,17 13,29 23,15 17.5,15" fill="#6E9F18"/>
    <!-- inner bolt (light green) -->
    <polygon points="19,3 17.5,15 23,15" fill="#ACD268"/>
  </g>
  <text x="278" y="26" font-family="Arial,sans-serif" font-size="13" fill="white" fill-opacity="0.65">Vitest</text>

  <!-- ── ESLint ── -->
  <g transform="translate(340,4)">
    <rect width="32" height="32" rx="4" fill="#4B32C3"/>
    <!-- hexagon outline -->
    <polygon points="16,5 24.66,10 24.66,22 16,27 7.34,22 7.34,10"
             fill="none" stroke="#8B80F8" stroke-width="2"/>
    <!-- inner filled hex -->
    <polygon points="16,10 21,13 21,19 16,22 11,19 11,13" fill="#8B80F8"/>
  </g>
  <text x="378" y="26" font-family="Arial,sans-serif" font-size="13" fill="white" fill-opacity="0.65">ESLint</text>

  <!-- ── Prettier ── -->
  <g transform="translate(450,4)">
    <rect width="32" height="32" rx="4" fill="#1A2B34"/>
    <rect x="7"  y="8"  width="18" height="3" rx="1.5" fill="#56B3B4"/>
    <rect x="7"  y="14" width="13" height="3" rx="1.5" fill="#EA5E5E"/>
    <rect x="7"  y="20" width="16" height="3" rx="1.5" fill="#BF85BF"/>
  </g>
  <text x="488" y="26" font-family="Arial,sans-serif" font-size="13" fill="white" fill-opacity="0.65">Prettier</text>

  <!-- ── pnpm ── -->
  <g transform="translate(565,4)">
    <rect width="32" height="32" rx="4" fill="#F69220"/>
    <rect x="5"  y="5"  width="9" height="9" rx="1.5" fill="white"/>
    <rect x="18" y="5"  width="9" height="9" rx="1.5" fill="white"/>
    <rect x="5"  y="18" width="9" height="9" rx="1.5" fill="white"/>
    <!-- bottom-right square: outlined only to show "package" concept -->
    <rect x="18" y="18" width="9" height="9" rx="1.5" fill="none" stroke="white" stroke-width="2"/>
  </g>
  <text x="603" y="26" font-family="Arial,sans-serif" font-size="13" fill="white" fill-opacity="0.65">pnpm</text>

  <!-- ── Web Workers ── -->
  <g transform="translate(665,4)">
    <rect width="32" height="32" rx="4" fill="#1e1e2e"/>
    <!-- central circle -->
    <circle cx="16" cy="16" r="4.5" fill="none" stroke="#F7DF1E" stroke-width="2"/>
    <circle cx="16" cy="16" r="2"   fill="#F7DF1E"/>
    <!-- 8 gear teeth as small rounded rects, rotated around center -->
    <rect x="14.5" y="4"    width="3" height="5" rx="1.2" fill="#F7DF1E"/>
    <rect x="14.5" y="23"   width="3" height="5" rx="1.2" fill="#F7DF1E"/>
    <rect x="4"    y="14.5" width="5" height="3" rx="1.2" fill="#F7DF1E"/>
    <rect x="23"   y="14.5" width="5" height="3" rx="1.2" fill="#F7DF1E"/>
    <rect x="7.5"  y="7.5"  width="3" height="5" rx="1.2" fill="#F7DF1E" transform="rotate(45,9,10)"/>
    <rect x="21.5" y="7.5"  width="3" height="5" rx="1.2" fill="#F7DF1E" transform="rotate(-45,23,10)"/>
    <rect x="7.5"  y="19.5" width="3" height="5" rx="1.2" fill="#F7DF1E" transform="rotate(-45,9,22)"/>
    <rect x="21.5" y="19.5" width="3" height="5" rx="1.2" fill="#F7DF1E" transform="rotate(45,23,22)"/>
  </g>
  <text x="703" y="20" font-family="Arial,sans-serif" font-size="13" fill="white" fill-opacity="0.65">Web</text>
  <text x="703" y="36" font-family="Arial,sans-serif" font-size="13" fill="white" fill-opacity="0.65">Workers</text>

</svg>
